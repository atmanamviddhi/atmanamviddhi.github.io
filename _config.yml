title: Ātmanam Viddhi
description: Sanātana Dharma, Hindu Philosophies, Spirituality and Philosophy
keywords: 
language: "en" # default language of the blog. Language codes: http://www.w3schools.com/tags/ref_language_codes.asp

markdown:         kramdown
kramdown:
  input: GFM
  hard_wrap: false
#kramdown:
 # syntax_highlighter_opts:
  #  disable: false
permalink: /blog/:year/:month/:day/:title
plugins_dir:
  - jekyll-seo-tag
  - jekyll-mentions
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-paginate

plugins:
  - jekyll-feed
  - jekyll/tagging
  - jekyll-tagging-related_posts

feed:
  tags: true

paginate: 5
#paginate_path: '/page:num'

# Name of repository, for use with Staticman
repository: "atmanamviddhi/atmanamviddhi.github.io"

# Staticman comments (see staticman.yml for configuration).
staticman:
  branch: "master"


staticman_url : https://my-blog-commets.herokuapp.com/v2/entry/atmanamviddhi/atmanamviddhi.github.io/master/comments
  

comments:
  provider: staticman_v2
  staticman:
    branch: master
    endpoint: https://my-blog-commets.herokuapp.com/v2/entry/atmanamviddhi/atmanamviddhi.github.io/
  

comments_locked: false

url: https://atmanamviddhi.github.io

author: Atmanamviddhi

facebook_username: "atmanam.viddhi"
github_username: "atmanamviddhi"
instagram_username: "atmanam.viddhi"
telegram_username: "atmanam_viddhi"
 
rss: true # just type anything here for a working RSS icon

telegram: false

tag_page_layout: tag_page
tag_page_dir: tag
tag_feed_layout: tag_feed
tag_feed_dir: tag
tag_permalink_style: pretty
tag_cloud: true
 
tag_page: '/blog/'
  
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  reddit: true
  whatsapp: true
  telegram: true

exclude: [vendor]
  
# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

#
# This file contains configuration flags to customize your site
#

#
# Flags below are optional
#

link-col: "##4400ff"



# Enter your Google Analytics web tracking code (e.g. UA-2110908-2) to activate tracking
google_analytics: UA-102581341-3

# Your website URL (e.g. http://barryclark.github.io or http://www.barryclark.co)
# Used for Sitema.xml and your RSS feed


# If you're hosting your site at a Project repository on GitHub pages
# (http://yourusername.github.io/repository-name)
# and NOT your User repository (http://yourusername.github.io)
# then add in the baseurl here, like this: "/repository-name"
#baseurl: "/programmercave"

#
# !! You don't need to change any of the configuration flags below !!

# Default YAML values (more information on Jekyll's site)


# Use tags index page and make tags on each post clickable
link-tags: true

# Set the Sass partials directory, as we're using @imports
sass:
  style: :compressed # You might prefer to minify using :compressed



# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

theme: jekyll-theme-minimal
