<form method="POST" action="https://my-blog-commets.herokuapp.com/v2/connect/atmanamviddhi/atmanamviddhi.github.io/master">
  <input name="options[redirect]" type="hidden" value="https://atmanamviddhi/atmanamviddhi.github.io">

  <input name="options[slug]" type="hidden" value="{{ page.slug }}">
  <label><input name="fields[name]" type="text">Name</label>
  <label><input name="fields[email]" type="email">E-mail</label>
  <label><textarea name="fields[message]"></textarea>Message</label>

  <button type="submit">Go!</button>
</form>
